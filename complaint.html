<!DOCTYPE html>
<html>

<head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ฟอร์มร้องทุกข์ / ข้อเสนอแนะ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- เพิ่ม Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="config.js"></script>

    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 15px;
        }

        .container {
            max-width: 650px;
            width: 100%;
        }

        .card {
            border: none;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            background: #ffffff;
            overflow: hidden;
        }

        .card-header-custom {
            background: #ffffff;
            color: #16a34a;
            padding: 35px 20px 25px;
            text-align: center;
            position: relative;
        }

        .card-header-custom h3 {
            font-weight: 600;
            margin: 0;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 1;
        }

        .card-body {
            padding: 0 30px 40px;
        }

        .form-control,
        .form-select {
            border-radius: 14px;
            padding: 14px 18px;
            border: 1.5px solid #e2e8f0;
            background-color: #f8fafc;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #16a34a;
            box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.1);
            background-color: #ffffff;
        }

        .form-label {
            font-weight: 500;
            color: #334155;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        /* กล่องข้อมูลพนักงาน */
        .emp-info {
            background: #f1f5f9;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1.5px solid #e2e8f0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .emp-avatar {
            width: 50px;
            height: 50px;
            background: #dbeafe;
            color: #3b82f6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.4s ease;
        }

        /* โหมดซ่อนตัวตน (Incognito) */
        .emp-info.incognito-mode {
            background: #1e293b;
            border-color: #0f172a;
            color: #f8fafc;
        }

        .emp-info.incognito-mode .emp-avatar {
            background: #334155;
            color: #fbbf24;
        }

        .emp-info.incognito-mode h5 {
            color: #f8fafc !important;
        }

        .emp-info.incognito-mode .text-muted-custom {
            color: #94a3b8 !important;
        }

        /* สวิตช์ซ่อนชื่อ */
        .anonymous-box {
            background: #fffbeb;
            border: 1.5px dashed #fbbf24;
            padding: 16px 20px;
            border-radius: 16px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .anonymous-box:hover {
            background: #fef3c7;
        }

        .form-switch .form-check-input {
            width: 3em;
            height: 1.5em;
            cursor: pointer;
        }

        .form-switch .form-check-input:checked {
            background-color: #d97706;
            border-color: #d97706;
        }

        /* ปุ่ม Submit */
        .btn-primary {
            background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
            border: none;
            box-shadow: 0 4px 15px rgba(22, 163, 74, 0.3);
            border-radius: 14px;
            padding: 16px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(22, 163, 74, 0.4);
        }

        @media (max-width: 480px) {
            body {
                padding: 10px 8px;
                align-items: flex-start;
            }

            .card-body {
                padding: 0 20px 30px;
            }

            .emp-info {
                padding: 15px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="card-header-custom">
                <h3><i class="bi bi-megaphone-fill text-success mb-2" style="font-size: 2rem; display: block;"></i>
                    ศูนย์รับเรื่องร้องทุกข์</h3>
                <p class="text-muted mt-2 mb-0" style="font-size: 0.9rem;">
                    ข้อเสนอแนะและปัญหาของคุณคือส่วนสำคัญในการพัฒนาองค์กร</p>
            </div>
            <div class="card-body">

                <!-- Loading State -->
                <div id="loadingSection" class="text-center py-5">
                    <div class="spinner-border text-success" role="status"></div>
                    <p class="mt-3 text-muted">กำลังตรวจสอบสิทธิ์เข้าใช้งาน...</p>
                </div>

                <!-- Form State -->
                <div id="formSection" style="display: none;">

                    <!-- กล่องข้อมูลพนักงาน -->
                    <div class="emp-info" id="empInfoBox">
                        <div class="emp-avatar" id="avatarIcon">
                            <i class="bi bi-person-fill"></i>
                        </div>
                        <div>
                            <h5 style="margin-bottom: 2px; color: #1e293b; font-weight: 600;" id="displayEmpName">
                                ชื่อพนักงาน</h5>
                            <div class="text-muted-custom" style="font-size: 0.85rem; color: #64748b;">
                                <i class="bi bi-credit-card-2-front"></i> <span id="displayEmpId"></span> &nbsp;|&nbsp;
                                <i class="bi bi-diagram-3"></i> <span id="displayDept"></span>
                            </div>
                        </div>
                    </div>

                    <!-- สวิตช์ซ่อนชื่อ -->
                    <div class="anonymous-box form-check form-switch">
                        <input class="form-check-input mt-0" type="checkbox" id="isAnonymous" name="isAnonymous"
                            onchange="toggleAnonymous()">
                        <div>
                            <label class="form-check-label d-block" for="isAnonymous"
                                style="font-weight: 600; color: #b45309; cursor: pointer;">
                                ปกปิดตัวตน (Anonymous Mode)
                            </label>
                            <span
                                style="font-size: 0.75rem; color: #d97706; line-height: 1.2; display: block; margin-top: 2px;">
                                ระบบจะลบชื่อและรหัสของคุณออกจากรายงาน ฝ่ายบุคคลจะไม่ทราบว่าใครเป็นผู้ส่ง
                            </span>
                        </div>
                    </div>

                    <form id="grievanceForm" onsubmit="handleFormSubmit(event)">
                        <!-- Hidden Fields -->
                        <input type="hidden" id="userId" name="userId" value="">
                        <input type="hidden" id="empName" name="empName" value="">
                        <input type="hidden" id="empId" name="empId" value="">
                        <input type="hidden" id="department" name="department" value="">
                        <input type="hidden" id="position" name="position" value="">
                        <input type="hidden" id="certBase64" name="certBase64" value="">
                        <input type="hidden" id="certMime" name="certMime" value="">
                        <input type="hidden" id="certName" name="certName" value="">

                        <div class="mb-4">
                            <label class="form-label"><i class="bi bi-list-check"></i> หัวข้อเรื่อง</label>
                            <select class="form-select" id="topic" name="topic" required>
                                <option value="" disabled selected>-- กรุณาเลือกหัวข้อ --</option>
                                <option value="เรื่องเพื่อนร่วมงาน / หัวหน้างาน">เรื่องเพื่อนร่วมงาน / หัวหน้างาน
                                </option>
                                <option value="เรื่องสภาพแวดล้อมการทำงาน">เรื่องสภาพแวดล้อมการทำงาน</option>
                                <option value="เรื่องสวัสดิการและผลตอบแทน">เรื่องสวัสดิการและผลตอบแทน</option>
                                <option value="ข้อเสนอแนะเพื่อการพัฒนา">ข้อเสนอแนะเพื่อการพัฒนาองค์กร</option>
                                <option value="ร้องเรียนการทุจริต / ผิดกฎ">แจ้งเบาะแสการทุจริต / ผิดกฎ</option>
                                <option value="อื่นๆ">อื่นๆ</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label"><i class="bi bi-chat-text"></i> รายละเอียด</label>
                            <textarea class="form-control" id="details" name="details" rows="5"
                                placeholder="อธิบายปัญหาหรือข้อเสนอแนะของคุณอย่างละเอียด..." required></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label" id="evidenceLabel"><i class="bi bi-image"></i>
                                อัปโหลดรูปภาพหลักฐาน <span class="text-muted"
                                    style="font-size:0.8rem;">(ถ้ามี)</span></label>
                            <input type="file" class="form-control" id="evidenceFile" accept="image/*"
                                style="padding: 10px 15px;">
                        </div>

                        <button type="submit" class="btn btn-primary w-100" id="submitBtn">
                            <i class="bi bi-send-fill"></i> ส่งข้อมูลเข้าสู่ระบบ
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        let empDataCache = null;

        window.onload = function () {
            const urlParams = new URLSearchParams(window.location.search);
            const UID_FROM_LINE = urlParams.get('uid');

            if (!UID_FROM_LINE) {
                document.getElementById('loadingSection').style.display = 'none';
                document.querySelector('.card-body').innerHTML = '<div class="text-center text-danger mt-5"><h4><i class="bi bi-x-circle-fill"></i> ข้อผิดพลาด</h4><p>ไม่พบรหัสผู้ใช้งาน กรุณาเข้าผ่านปุ่มใน LINE</p></div>';
                return;
            }

            document.getElementById('userId').value = UID_FROM_LINE;

            // ดึงข้อมูลพนักงานจาก API
            fetch(GAS_API_URL + "?action=getEmployeeData&uid=" + UID_FROM_LINE)
                .then(res => res.json())
                .then(response => {
                    document.getElementById('loadingSection').style.display = 'none';
                    if (response.status !== 'success' || !response.data) {
                        window.location.href = 'register.html?uid=' + UID_FROM_LINE + '&target=complaint';
                        return;
                    }

                    const emp = response.data;
                    empDataCache = emp;
                    document.getElementById('formSection').style.display = 'block';
                    fillEmpData(emp);
                })
                .catch(error => {
                    Swal.fire('ข้อผิดพลาด', 'เกิดข้อผิดพลาดในการโหลดข้อมูล: ' + error.message, 'error');
                });
        };

        function fillEmpData(emp) {
            document.getElementById('displayEmpName').innerText = emp.name;
            document.getElementById('displayEmpId').innerText = emp.empId;
            document.getElementById('displayDept').innerText = emp.department || "-";

            document.getElementById('empName').value = emp.name;
            document.getElementById('empId').value = emp.empId || "";
            document.getElementById('department').value = emp.department || "";
            document.getElementById('position').value = emp.position || "";
        }

        // ฟังก์ชันจัดการโหมดซ่อนตัวตน
        function toggleAnonymous() {
            let isAnon = document.getElementById('isAnonymous').checked;
            let infoBox = document.getElementById('empInfoBox');
            let avatarIcon = document.getElementById('avatarIcon');

            if (isAnon) {
                // เปิดโหมด Incognito (เปลี่ยน UI เป็นสีเข้มและเปลี่ยนรูป)
                infoBox.classList.add('incognito-mode');
                avatarIcon.innerHTML = '<i class="bi bi-incognito"></i>';

                document.getElementById('displayEmpName').innerText = "ผู้ไม่ประสงค์ออกนาม (Anonymous)";
                document.getElementById('displayEmpId').innerText = "ซ่อนข้อมูล";
                document.getElementById('displayDept').innerText = "ซ่อนข้อมูล";

                document.getElementById('empName').value = "ผู้ไม่ประสงค์ออกนาม";
                document.getElementById('empId').value = "-";
                document.getElementById('department').value = "-";
                document.getElementById('position').value = "-";
            } else {
                // ปิดโหมด คืนค่าเดิม
                infoBox.classList.remove('incognito-mode');
                avatarIcon.innerHTML = '<i class="bi bi-person-fill"></i>';

                if (empDataCache) {
                    fillEmpData(empDataCache);
                }
            }
        }

        async function handleFormSubmit(event) {
            event.preventDefault();

            let btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> กำลังเข้ารหัสและส่งข้อมูล...';

            let form = document.getElementById('grievanceForm');
            let fileInput = document.getElementById('evidenceFile');

            if (fileInput.files.length > 0) {
                let file = fileInput.files[0];
                if (file.size > 10 * 1024 * 1024) {
                    Swal.fire('ขนาดไฟล์ใหญ่เกินไป', 'กรุณาอัปโหลดรูปภาพขนาดไม่เกิน 10MB', 'warning');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-send-fill"></i> ส่งข้อมูลเข้าสู่ระบบ';
                    return;
                }

                try {
                    let base64 = await resizeAndConvertImage(file);
                    document.getElementById('certBase64').value = base64.split(',')[1];
                    document.getElementById('certMime').value = base64.split(';')[0].split(':')[1];
                    document.getElementById('certName').value = file.name;
                } catch (e) {
                    Swal.fire('ข้อผิดพลาด', 'ไม่สามารถอ่านไฟล์ภาพได้', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-send-fill"></i> ส่งข้อมูลเข้าสู่ระบบ';
                    return;
                }
            } else {
                document.getElementById('certBase64').value = "";
            }

            let formData = {
                userId: document.getElementById('userId').value,
                empName: document.getElementById('empName').value,
                empId: document.getElementById('empId').value,
                department: document.getElementById('department').value,
                position: document.getElementById('position').value,
                topic: document.getElementById('topic').value,
                details: document.getElementById('details').value,
                isAnonymous: document.getElementById('isAnonymous').checked ? 'ใช่' : 'ไม่ใช่',
                certBase64: document.getElementById('certBase64').value,
                certMime: document.getElementById('certMime').value,
                certName: document.getElementById('certName').value
            };

            fetch(GAS_API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "processGrievanceForm", data: formData })
            })
            .then(res => res.json())
            .then(response => {
                if (response.status === 'success') {
                    Swal.fire({
                        icon: 'success',
                        title: 'บันทึกข้อมูลสำเร็จ',
                        text: 'ระบบได้รับเรื่องร้องเรียน / ข้อเสนอแนะของคุณเรียบร้อยแล้ว',
                        confirmButtonColor: '#16a34a'
                    }).then(() => {
                        location.reload();
                    });
                } else {
                    Swal.fire('ข้อผิดพลาด', response.message, 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-send-fill"></i> ส่งข้อมูลเข้าสู่ระบบ';
                }
            })
            .catch(error => {
                Swal.fire('ข้อผิดพลาด', error.message, 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-send-fill"></i> ส่งข้อมูลเข้าสู่ระบบ';
            });
        }

        // ระบบบีบอัดภาพก่อนส่ง
        function resizeAndConvertImage(file) {
            return new Promise((resolve, reject) => {
                let reader = new FileReader();
                reader.onload = function (event) {
                    let img = new Image();
                    img.onload = function () {
                        let canvas = document.createElement('canvas');
                        let MAX_WIDTH = 1200;
                        let MAX_HEIGHT = 1200;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        } else {
                            if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        let ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                    img.onerror = reject;
                    img.src = event.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
    </script>
</body>

</html>
