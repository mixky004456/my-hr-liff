<!DOCTYPE html>
<html lang="th">

<head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>โปรไฟล์พนักงาน (Employee Profile)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="config.js"></script>

    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            min-height: 100vh;
            padding: 20px 10px 40px;
            color: #1e293b;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
        }

        /* ===== Navbar Header ===== */
        .portal-header {
            background: #ffffff;
            border-radius: 16px;
            padding: 12px 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .portal-title {
            font-weight: 700;
            color: #16a34a;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
        }

        .portal-date {
            font-size: 0.8rem;
            color: #64748b;
        }

        /* ===== Card Base ===== */
        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            background: #ffffff;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .card-header-custom {
            background: #ffffff;
            color: #16a34a;
            padding: 20px 20px 10px;
            font-weight: 600;
            font-size: 1.05rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #f1f5f9;
        }

        .card-header-custom i {
            color: #16a34a;
            font-size: 1.2rem;
        }

        .card-body-custom {
            padding: 20px;
        }

        /* ===== Section 1: Profile Header ===== */
        .profile-header-card {
            background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
            border-radius: 20px;
            padding: 30px 20px 25px;
            text-align: center;
            color: #ffffff;
            box-shadow: 0 10px 25px rgba(22, 163, 74, 0.25);
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .profile-header-card::before {
            content: '';
            position: absolute;
            top: -40px;
            right: -40px;
            width: 140px;
            height: 140px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #ffffff;
            color: #15803d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0 auto 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            border: 3px solid rgba(255, 255, 255, 0.4);
        }

        .profile-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .profile-nickname {
            font-weight: 400;
            opacity: 0.9;
        }

        .profile-position {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 12px;
        }

        .profile-badge-id {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 500;
            backdrop-filter: blur(5px);
        }

        /* ===== Section 2: Info Rows ===== */
        .info-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px dashed #e2e8f0;
            font-size: 0.9rem;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #64748b;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-label i {
            color: #16a34a;
            width: 18px;
            text-align: center;
        }

        .info-value {
            font-weight: 600;
            color: #1e293b;
            text-align: right;
        }

        /* ===== Section 3: Evaluation Cards ===== */
        .eval-card {
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }

        .eval-card:last-child {
            margin-bottom: 0;
        }

        .eval-card.grade-a {
            background-color: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #15803d;
        }

        .eval-card.grade-b {
            background-color: #eff6ff;
            border: 1px solid #bfdbfe;
            color: #1d4ed8;
        }

        .eval-card.grade-c {
            background-color: #fffbeb;
            border: 1px solid #fde68a;
            color: #b45309;
        }

        .eval-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .eval-period {
            font-size: 0.85rem;
            font-weight: 600;
        }

        .score-circle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.95rem;
            background: #ffffff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .eval-card.grade-a .score-circle {
            border: 3px solid #16a34a;
            color: #16a34a;
        }

        .eval-card.grade-b .score-circle {
            border: 3px solid #2563eb;
            color: #2563eb;
        }

        .eval-card.grade-c .score-circle {
            border: 3px solid #d97706;
            color: #d97706;
        }

        .eval-grade-display {
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1;
        }

        .eval-summary {
            font-size: 0.83rem;
            line-height: 1.5;
            opacity: 0.9;
        }

        /* ===== Section 4: Training Table (Reduced) ===== */
        .training-item {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 10px;
            background: #fafafa;
            transition: all 0.2s ease;
        }

        .training-item:hover {
            border-color: #16a34a;
            background: #f0fdf4;
        }

        .training-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: #1e293b;
            margin-bottom: 4px;
        }

        .training-meta {
            font-size: 0.8rem;
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 6px;
        }

        .badge-status {
            font-size: 0.72rem;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: 500;
        }

        .badge-pass {
            background-color: #dcfce7;
            color: #16a34a;
        }

        .badge-fail {
            background-color: #fee2e2;
            color: #dc2626;
        }

        .badge-ongoing {
            background-color: #fef3c7;
            color: #d97706;
        }

        .badge-pending {
            background-color: #e0f2fe;
            color: #0284c7;
        }

        .badge-type {
            font-size: 0.72rem;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: 500;
        }

        .badge-type-internal {
            background-color: #e0f2fe;
            color: #0284c7;
        }

        .badge-type-external {
            background-color: #fef3c7;
            color: #d97706;
        }

        .badge-type-ojt {
            background-color: #ede9fe;
            color: #7c3aed;
        }

        .btn-view-more {
            background-color: #f0fdf4;
            color: #16a34a;
            border: 1.5px solid #16a34a;
            border-radius: 12px;
            padding: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            width: 100%;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            margin-top: 10px;
        }

        .btn-view-more:hover {
            background-color: #16a34a;
            color: #ffffff;
        }

        /* ===== Loading & Error States ===== */
        .state-box {
            text-align: center;
            padding: 40px 20px;
        }

        .empty-state {
            text-align: center;
            padding: 25px 10px;
            color: #94a3b8;
        }

        .empty-state i {
            font-size: 2.2rem;
            margin-bottom: 8px;
            display: block;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- Top Header -->
        <div class="portal-header">
            <h1 class="portal-title">
                <i class="bi bi-person-badge-fill"></i> EMPLOYEE PORTAL
            </h1>
            <div class="portal-date" id="navDate">-</div>
        </div>

        <!-- Loading State -->
        <div id="loadingSection" class="state-box">
            <div class="spinner-border text-success" role="status"></div>
            <p class="mt-3 text-muted" style="font-size: 0.9rem;">กำลังโหลดข้อมูลโปรไฟล์...</p>
        </div>

        <!-- Error State -->
        <div id="errorSection" style="display: none;" class="state-box"></div>

        <!-- Main Content -->
        <div id="mainContent" style="display: none;">

            <!-- Section 1: Header Profile Card -->
            <div class="profile-header-card">
                <div class="avatar" id="profileAvatar">-</div>
                <div class="profile-name" id="profileName">-</div>
                <div class="profile-position" id="profilePosition">-</div>
                <div class="profile-badge-id">
                    <i class="bi bi-card-heading"></i> รหัสพนักงาน: <span id="profileEmpId">-</span>
                </div>
            </div>

            <!-- Section 2: Employee Data Card -->
            <div class="card">
                <div class="card-header-custom">
                    <i class="bi bi-person-text"></i> ข้อมูลพนักงาน
                </div>
                <div class="card-body-custom">
                    <div class="info-row">
                        <div class="info-label"><i class="bi bi-cake2"></i> อายุ</div>
                        <div class="info-value" id="infoAge">-</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label"><i class="bi bi-diagram-3"></i> แผนก</div>
                        <div class="info-value" id="infoDepartment">-</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label"><i class="bi bi-building"></i> ฝ่าย</div>
                        <div class="info-value" id="infoDivision">-</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label"><i class="bi bi-calendar-event"></i> วันเริ่มงาน</div>
                        <div class="info-value" id="infoStartDate">-</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label"><i class="bi bi-award"></i> อายุงาน</div>
                        <div class="info-value" id="infoConfirmDate">-</div>
                    </div>
                </div>
            </div>

            <!-- Section 3: Evaluation Results (2 Years) -->
            <div class="card">
                <div class="card-header-custom">
                    <i class="bi bi-graph-up-arrow"></i> ผลการประเมิน 2 ปีล่าสุด
                </div>
                <div class="card-body-custom" id="evalCardsWrapper">
                    <!-- Rendered by JS -->
                </div>
            </div>

            <!-- Section 4: Training History (Summary overview - Max 3 items) -->
            <div class="card">
                <div class="card-header-custom">
                    <i class="bi bi-journal-bookmark-fill"></i> ประวัติการอบรม
                </div>
                <div class="card-body-custom">
                    <div id="trainingHistoryContainer">
                        <!-- Rendered by JS -->
                    </div>

                    <!-- Button to navigate to full Training page -->
                    <a id="btnGoToTraining" href="#" class="btn-view-more">
                        ดูประวัติการอบรมทั้งหมด <i class="bi bi-arrow-right-short"></i>
                    </a>
                </div>
            </div>

        </div> <!-- End Main Content -->

    </div>

    <script>
        let currentEmpId = '';
        let currentUid = '';

        function getInitials(name) {
            if (!name || name === '-') return '?';
            const parts = name.trim().split(/\s+/);
            if (parts.length >= 2) {
                return parts[0].charAt(0) + parts[1].charAt(0);
            }
            return parts[0].charAt(0);
        }

        function setNavDate() {
            const now = new Date();
            const thaiMonths = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.",
                "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
            const day = now.getDate();
            const month = thaiMonths[now.getMonth()];
            const year = now.getFullYear() + 543;
            document.getElementById('navDate').textContent = `${day} ${month} ${year}`;
        }

        // ===== ผลการประเมิน (รอเชื่อมต่อกับ Google Sheets ในอนาคต) =====
        function getEvaluations(empId) {
            // ในอนาคตจะดึงข้อมูลจาก Google Sheets ตอนนี้ให้ส่งค่าเป็นอาร์เรย์ว่างไปก่อน
            return [];
        }

        // ===== Render Profile Header & Details =====
        function renderProfileHeader(emp) {
            document.getElementById('profileAvatar').textContent = getInitials(emp.name);
            const nameEl = document.getElementById('profileName');
            if (emp.nickname) {
                nameEl.innerHTML = `${emp.name} <span class="profile-nickname">(${emp.nickname})</span>`;
            } else {
                nameEl.textContent = emp.name;
            }
            document.getElementById('profilePosition').textContent = emp.position || '-';
            document.getElementById('profileEmpId').textContent = emp.empId || '-';
        }

        function renderEmployeeInfo(emp) {
            document.getElementById('infoAge').textContent = emp.age ? `${emp.age} ปี` : '-';
            document.getElementById('infoDepartment').textContent = emp.department || '-';
            document.getElementById('infoDivision').textContent = emp.division || '-';
            document.getElementById('infoStartDate').textContent = emp.startDate || '-';
            document.getElementById('infoConfirmDate').textContent = emp.workTenure || '-';
        }

        function renderEvaluations(evaluations) {
            const wrapper = document.getElementById('evalCardsWrapper');
            if (!evaluations || evaluations.length === 0) {
                wrapper.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-clipboard-data"></i>
                        <p>ยังไม่มีข้อมูลผลการประเมิน</p>
                    </div>`;
                return;
            }

            wrapper.innerHTML = evaluations.map(ev => {
                let gradeClass = 'grade-b';
                const g = String(ev.grade).toUpperCase().replace('+', '');
                if (g === 'A') gradeClass = 'grade-a';
                else if (g === 'B') gradeClass = 'grade-b';
                else if (g === 'C') gradeClass = 'grade-c';

                return `
                    <div class="eval-card ${gradeClass}">
                        <div class="eval-header">
                            <div>
                                <div class="eval-period"><i class="bi bi-calendar3"></i> ${ev.period}</div>
                                <div class="eval-grade-display mt-1">เกรด ${ev.grade}</div>
                            </div>
                        </div>
                        <div class="eval-summary">
                            <i class="bi bi-chat-left-text"></i> ${ev.summary}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function parseDateForSorting(dateStr) {
            if (!dateStr) return 0;
            const months = {
                "ม.ค.": 0, "ก.พ.": 1, "มี.ค.": 2, "เม.ย.": 3, "พ.ค.": 4, "มิ.ย.": 5,
                "ก.ค.": 6, "ส.ค.": 7, "ก.ย.": 8, "ต.ค.": 9, "พ.ย.": 10, "ธ.ค.": 11
            };
            const parts = String(dateStr).trim().split(/\s+/);
            if (parts.length === 3) {
                const day = parseInt(parts[0]) || 1;
                const month = months[parts[1]] !== undefined ? months[parts[1]] : 0;
                let year = parseInt(parts[2]) || 2024;
                if (year > 2500) year -= 543;
                return new Date(year, month, day).getTime();
            }
            const slashParts = String(dateStr).trim().split('/');
            if (slashParts.length === 3) {
                const day = parseInt(slashParts[0]) || 1;
                const month = parseInt(slashParts[1]) - 1 || 0;
                let year = parseInt(slashParts[2]) || 2024;
                if (year > 2500) year -= 543;
                return new Date(year, month, day).getTime();
            }
            return 0;
        }

        // ===== Render Training History (Only max 3 items, NO hours shown) =====
        function renderTrainingOverview(records) {
            const container = document.getElementById('trainingHistoryContainer');

            if (!records || records.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-inbox"></i>
                        <p>ยังไม่มีประวัติการอบรม</p>
                    </div>`;
                return;
            }

            // เรียงลำดับจากวันที่ล่าสุดไปหาเก่าสุด แล้วเลือก 3 รายการแรก
            const sortedRecords = [...records].sort((a, b) => parseDateForSorting(b.date) - parseDateForSorting(a.date));
            const top3Records = sortedRecords.slice(0, 3);

            let html = '';
            top3Records.forEach(item => {
                let statusBadge = '';
                const statusStr = String(item.status || '').trim();
                if (statusStr === 'ผ่าน' || statusStr === 'ผ่านการอบรม') {
                    statusBadge = `<span class="badge-status badge-pass"><i class="bi bi-check-circle-fill"></i> ผ่าน</span>`;
                } else if (statusStr === 'ไม่ผ่าน') {
                    statusBadge = `<span class="badge-status badge-fail"><i class="bi bi-x-circle-fill"></i> ไม่ผ่าน</span>`;
                } else if (statusStr === 'กำลังอบรม') {
                    statusBadge = `<span class="badge-status badge-ongoing"><i class="bi bi-hourglass-split"></i> กำลังอบรม</span>`;
                } else {
                    statusBadge = `<span class="badge-status badge-pending">${statusStr || 'รออบรม'}</span>`;
                }

                let typeBadge = '';
                const typeStr = String(item.type || '').trim();
                if (typeStr === 'ภายนอก') {
                    typeBadge = `<span class="badge-type badge-type-external">ภายนอก</span>`;
                } else if (typeStr === 'OJT' || typeStr === 'O.J.T.') {
                    typeBadge = `<span class="badge-type badge-type-ojt">OJT</span>`;
                } else {
                    typeBadge = `<span class="badge-type badge-type-internal">ภายใน</span>`;
                }

                html += `
                    <div class="training-item">
                        <div class="training-title">${item.courseName}</div>
                        <div class="training-meta">
                            <span><i class="bi bi-calendar-event"></i> ${item.date || '-'}</span>
                            <div>
                                ${statusBadge}
                                ${typeBadge}
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // ===== Fetch Training History from API =====
        function loadTrainingHistory(empId) {
            const container = document.getElementById('trainingHistoryContainer');
            container.innerHTML = '<div class="text-center py-3 text-muted" style="font-size:0.85rem;"><div class="spinner-border spinner-border-sm text-success" role="status"></div> กำลังโหลดประวัติ...</div>';

            fetch(GAS_API_URL + "?action=getMyTrainingHistory&empId=" + encodeURIComponent(empId))
                .then(res => res.json())
                .then(response => {
                    if (response.status === 'success' && response.data) {
                        renderTrainingOverview(response.data);
                    } else {
                        renderTrainingOverview([]);
                    }
                })
                .catch(error => {
                    console.error('Error loading training history:', error);
                    renderTrainingOverview([]);
                });
        }

        // ===== Page Initialization =====
        window.onload = function () {
            setNavDate();

            const urlParams = new URLSearchParams(window.location.search);
            const UID_FROM_LINE = urlParams.get('uid');
            currentUid = UID_FROM_LINE;

            if (!UID_FROM_LINE) {
                document.getElementById('loadingSection').style.display = 'none';
                document.getElementById('errorSection').innerHTML = `
                    <div class="p-4 text-center">
                        <div class="text-danger mb-2" style="font-size: 2.5rem;"><i class="bi bi-x-circle-fill"></i></div>
                        <h5 class="text-danger font-weight-bold">ข้อผิดพลาด</h5>
                        <p class="text-muted" style="font-size:0.88rem;">ไม่พบรหัสผู้ใช้งาน กรุณาเข้าใช้งานผ่านปุ่มใน LINE เท่านั้น</p>
                    </div>`;
                document.getElementById('errorSection').style.display = 'block';
                return;
            }

            // Set link to Training page (open directly on "ประวัติการอบรมของฉัน" tab)
            document.getElementById('btnGoToTraining').href = `training.html?uid=${encodeURIComponent(UID_FROM_LINE)}&tab=history`;

            // Fetch employee data
            fetch(GAS_API_URL + "?action=getEmployeeData&uid=" + UID_FROM_LINE)
                .then(res => res.json())
                .then(response => {
                    document.getElementById('loadingSection').style.display = 'none';

                    if (response.status !== 'success' || !response.data) {
                        document.getElementById('errorSection').innerHTML = `
                            <div class="p-4 text-center">
                                <div class="text-danger mb-2" style="font-size: 2.5rem;"><i class="bi bi-person-x-fill"></i></div>
                                <h5 class="text-danger font-weight-bold">ไม่พบข้อมูลพนักงาน</h5>
                                <p class="text-muted" style="font-size:0.88rem;">ระบบไม่พบข้อมูลของคุณในฐานข้อมูล<br>กรุณาติดต่อ <b>ฝ่ายบุคคล (HR)</b> เพื่อลงทะเบียนเข้าใช้งาน</p>
                            </div>`;
                        document.getElementById('errorSection').style.display = 'block';
                        return;
                    }

                    const emp = response.data;
                    currentEmpId = emp.empId;

                    renderProfileHeader(emp);
                    renderEmployeeInfo(emp);

                    const evaluations = getEvaluations(currentEmpId);
                    renderEvaluations(evaluations);

                    loadTrainingHistory(currentEmpId);

                    document.getElementById('mainContent').style.display = 'block';
                })
                .catch(error => {
                    document.getElementById('loadingSection').style.display = 'none';
                    document.getElementById('errorSection').innerHTML = `<div class="p-4 text-center text-danger"><h4>ข้อผิดพลาดระบบ</h4><p>${error.message}</p></div>`;
                    document.getElementById('errorSection').style.display = 'block';
                });
        };
    </script>
</body>

</html>
