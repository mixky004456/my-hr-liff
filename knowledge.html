<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>องค์ความรู้ (Knowledge Base)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="config.js"></script>
    <style>
        :root {
            --brand: #16a34a;
            --brand-dark: #15803d;
            --ink: #1e293b;
            --muted: #64748b;
            --line: #e2e8f0;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 30px 15px;
            color: var(--ink);
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        .main-card {
            border: none;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            background: #fff;
            overflow: hidden;
        }

        .card-header-custom {
            background: #fff;
            color: var(--brand);
            padding: 32px 20px 20px;
            text-align: center;
            border-bottom: 1px solid var(--line);
            margin-bottom: 24px;
        }

        .card-header-custom h3 {
            font-weight: 600;
            margin: 0;
            font-size: 1.35rem;
            color: var(--ink);
        }

        .card-body-custom {
            padding: 0 30px 40px;
        }

        /* ---------- Search Box ---------- */
        .search-container {
            max-width: 100%;
            margin-bottom: 20px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px 14px 48px;
            border-radius: 14px;
            border: 1.5px solid var(--line);
            background-color: #f8fafc;
            font-size: 0.95rem;
            transition: all 0.25s ease;
            color: var(--ink);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--brand);
            box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.1);
            background-color: #fff;
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 1.1rem;
        }

        /* ---------- Dropdown สไตล์เดียวกับหน้าลางาน ---------- */
        .form-label {
            font-weight: 500;
            color: #334155;
            margin-bottom: 8px;
            font-size: 0.95rem;
            display: block;
        }

        .form-select {
            border-radius: 14px;
            padding: 14px 18px;
            border: 1.5px solid var(--line);
            background-color: #f8fafc;
            transition: all 0.25s ease;
            font-size: 0.95rem;
            color: var(--ink);
            cursor: pointer;
        }

        .form-select:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.1);
            background-color: #fff;
            outline: none;
        }

        /* ---------- Knowledge Cards ---------- */
        .knowledge-card {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            border: 1.5px solid var(--line);
            transition: all 0.25s ease;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .knowledge-card:hover {
            transform: translateY(-3px);
            border-color: #bbf7d0;
            box-shadow: 0 10px 25px rgba(22, 163, 74, 0.08);
        }

        .k-icon-wrapper {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            margin-bottom: 14px;
        }

        .icon-hr {
            background: #fee2e2;
            color: #ef4444;
        }

        .icon-it {
            background: #dbeafe;
            color: #3b82f6;
        }

        .icon-qms {
            background: #dcfce7;
            color: #22c55e;
        }

        .icon-academic {
            background: #fef08a;
            color: #eab308;
        }

        .icon-general {
            background: #f3f4f6;
            color: #6b7280;
        }

        .k-title {
            font-weight: 600;
            font-size: 1.05rem;
            margin-bottom: 8px;
            color: var(--ink);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        .k-desc {
            color: var(--muted);
            font-size: 0.85rem;
            margin-bottom: 20px;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.6;
        }

        .k-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 14px;
            border-top: 1px dashed var(--line);
        }

        .k-category {
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 20px;
            background: #f1f5f9;
            color: var(--muted);
            font-weight: 500;
        }

        .btn-read {
            background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            padding: 6px 16px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(22, 163, 74, 0.25);
        }

        .btn-read:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(22, 163, 74, 0.35);
            color: #ffffff;
        }

        /* ---------- Empty State ---------- */
        .empty-state {
            text-align: center;
            padding: 45px 20px;
            color: var(--muted);
        }

        .empty-state i {
            font-size: 2.8rem;
            color: #cbd5e1;
            display: block;
            margin-bottom: 12px;
        }

        /* ---------- Responsive ---------- */
        @media (max-width: 480px) {
            body {
                padding: 12px 8px;
            }

            .card-body-custom {
                padding: 16px 16px 24px !important;
            }

            .card-header-custom {
                padding: 24px 16px 16px;
                margin-bottom: 16px;
            }

            .form-select,
            .search-input {
                padding: 12px 16px;
                font-size: 0.9rem;
            }

            .search-input {
                padding-left: 44px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="main-card">
            <!-- Header แบบเดียวกับหน้าระบบลางาน -->
            <div class="card-header-custom">
                <i class="bi bi-book-half"
                    style="font-size: 2rem; display: block; margin-bottom: 6px; color: var(--brand);"></i>
                <h3>องค์ความรู้ (Knowledge Base)</h3>
            </div>

            <div class="card-body-custom">
                <!-- Search Box -->
                <div class="search-container">
                    <i class="bi bi-search search-icon"></i>
                    <input type="text" id="searchInput" class="search-input"
                        placeholder="ค้นหาบทความ... (เช่น วิธีเบิก, คู่มือการใช้งาน)">
                </div>

                <!-- Categories เปลี่ยนเป็น Dropdown สไตล์เดียวกับฟอร์มลางาน -->
                <div class="mb-4">
                    <label class="form-label" for="categorySelect">
                        <i class="bi bi-folder2-open"></i> หมวดหมู่บทความ
                    </label>
                    <select id="categorySelect" class="form-select" onchange="setCategory(this.value)">
                        <!-- Categories will be generated here -->
                    </select>
                </div>

                <!-- Knowledge Grid -->
                <div class="row g-3" id="knowledgeGrid">
                    <!-- Knowledge cards will be generated here -->
                </div>

                <!-- Empty State -->
                <div id="noResults" class="empty-state d-none">
                    <i class="bi bi-journal-x"></i>
                    <h5 class="mt-2" style="color: var(--ink); font-weight: 500;">ไม่พบบทความที่ค้นหา</h5>
                    <p style="font-size: 0.88rem;">ลองใช้คำค้นหาอื่น หรือเลือกหมวดหมู่ทั้งหมด</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for Reading Article -->
    <div class="modal fade" id="articleModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content" style="border-radius: 20px; border: none;">
                <div class="modal-header" style="border-bottom: 1px solid var(--line); padding: 20px 24px;">
                    <h5 class="modal-title fw-bold" id="articleTitle" style="color: var(--ink); font-size: 1.1rem;">
                        ชื่อบทความ</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" style="padding: 0;">
                    <div id="articleCarousel" class="carousel slide" data-bs-touch="true" data-bs-interval="false">
                        <div class="carousel-inner" id="carouselInner">
                            <!-- Slides dynamically generated -->
                        </div>
                        <div id="carouselControls">
                            <!-- Controls dynamically generated -->
                        </div>
                    </div>
                </div>
                <div class="modal-footer"
                    style="border-top: 1px solid var(--line); padding: 16px 24px; background: #f8fafc; border-radius: 0 0 20px 20px;">
                    <a href="#" id="pdfDownloadBtn" target="_blank" class="btn btn-primary d-none"
                        style="border-radius: 12px; padding: 8px 20px; background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%); border: none;"><i
                            class="bi bi-file-earmark-pdf"></i>
                        อ่านฉบับเต็ม (PDF)</a>
                    <button type="button" class="btn"
                        style="border-radius: 12px; padding: 8px 20px; background: #e2e8f0; color: var(--ink); font-weight: 500;"
                        data-bs-dismiss="modal">ปิดหน้าต่าง</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Mock Data / Default Data for Knowledge Base
        const defaultArticles = [
            {
                id: 2,
                title: 'ความรู้พื้นฐานระบบมาตรฐานคุณภาพ ISO 9001:2015',
                description: 'ความสำคัญ ประโยชน์ ข้อกำหนด และประเภทเอกสารของระบบบริหารงานคุณภาพ ISO 9001:2015',
                content: '<p><strong>ISO 9001:2015</strong> คือ ระบบมาตรฐานคุณภาพที่มีความสำคัญต่อองค์กร โดยมีประโยชน์ดังนี้:</p><ul><li>เพิ่มความน่าเชื่อถือให้กับองค์กร และเพิ่มศักยภาพในการแข่งขัน</li><li>ช่วยให้บริหารงานได้อย่างเป็นระบบมากขึ้น</li><li>เกิดการพัฒนา ปรับปรุงอย่างต่อเนื่อง</li></ul><p><strong>ข้อกำหนดหลัก (10 ข้อ):</strong></p><ol><li>บทนำ</li><li>ขอบข่าย</li><li>อ้างอิง</li><li>นิยามและคำจำกัดความ</li><li>บริบทขององค์กร</li><li>ภาวะผู้นำ (นโยบายคุณภาพ)</li><li>การวางแผน (KPI, ความเสี่ยง)</li><li>การสนับสนุน (ควบคุมเอกสาร, ทรัพยากร)</li><li>การดำเนินการ (ระเบียบปฏิบัติ, แบบฟอร์ม)</li><li>การประเมินสมรรถนะ (การตรวจติดตามภายใน)</li><li>การปรับปรุง (CPAR)</li></ol><p><strong>ประเภทเอกสารในระบบ:</strong></p><ul><li>คู่มือคุณภาพ (Quality Manual - QM)</li><li>ระเบียบปฏิบัติงาน (Quality Procedure - P)</li><li>วิธีปฏิบัติงาน (Work Instruction - WI)</li><li>แบบฟอร์มต่างๆ (Form - F)</li><li>เอกสารสนับสนุน (Supporting Document - SD)</li></ul>',
                category: 'QMS',
                date: '20 ก.ค. 2026',
                pdfLink: 'https://drive.google.com/file/d/1ToUxfImM7TT0M2RY2mdsWLCgwgKIoGUG/view?usp=drive_link'
            },
            {
                id: 3,
                title: 'เตือนภัย! มิจฉาชีพหลอกลงทุนบนโซเชียลมีเดีย',
                description: 'รู้ทันกลโกงการชักชวนลงทุนใน Social Media ที่อ้างว่าได้กำไรสูง',
                content: '<p><strong>ระวังมิจฉาชีพใช้วิธีเดิมหลอกเหยื่อ!</strong></p><ul><li>เจอโฆษณาชวนลงทุนในโซเชียล ทักไปแล้วโดนชวนแอดไลน์</li><li>เจอ "ผู้แนะนำการลงทุน" ปลอม พร้อมแสดงบัตรสร้างความน่าเชื่อถือ</li><li>ถูกดึงเข้ากลุ่มไลน์ที่มีหน้าม้าอวดกำไรสูง</li><li>ทดลองลงทุนครั้งแรกได้กำไรจริง และถอนเงินได้ เพื่อให้หลงเชื่อ</li><li>เมื่อถูกชวนลงทุนหนักขึ้น และต้องการถอนเงิน จะโดนอ้างว่าต้องจ่ายค่าธรรมเนียมหรือภาษี</li><li>หากไม่จ่าย จะถูกขู่ปิดบัญชี</li></ul><p><em>ทั้งหมดนี้คือจิตวิทยามิจฉาชีพ ที่ใช้ความโลภ ความกลัว และความเร่งเร้า เพื่อหลอกลวงให้โอนเงิน</em></p>',
                category: 'IT',
                date: '20 ก.ค. 2026',
                pdfLink: 'https://drive.google.com/file/d/1MHmhqLJnAErDMJxgzV2CJQuTosrMbyJN/view?usp=sharing'
            },
            {
                id: 6,
                title: 'สรุปเรื่องที่ต้องรู้: กองทุนสงเคราะห์ลูกจ้าง (เริ่ม 1 ต.ค. 2568)',
                description: 'เงื่อนไขกิจการที่ต้องเข้ากองทุน หน้าที่ของนายจ้าง อัตราเงินสมทบ และค่าจ้างที่นำมาคำนวณ',
                content: '<h5>🏢 กิจการที่ต้องเข้ากองทุนสงเคราะห์ลูกจ้าง (เริ่ม 1 ต.ค. 68)</h5><ul><li>สถานประกอบการเอกชนที่มีลูกจ้าง 10 คนขึ้นไป</li><li>ไม่ได้อยู่ในกองทุนสำรองเลี้ยงชีพ หรือไม่ได้จัดให้มีการสงเคราะห์ลูกจ้างกรณีออกจากงาน</li></ul><hr><h5 class="mt-3">👨‍💼 ลูกจ้างที่ต้องเข้ากองทุนฯ</h5><ul><li>พนักงานรายวัน, รายเดือน, สัญญาจ้างชั่วคราว, ต่างชาติ, ผู้บริหารที่รับเงินเดือน</li><li>(ยกเว้นลูกจ้างที่เข้ากองทุนสำรองเลี้ยงชีพแล้ว)</li></ul><hr><h5 class="mt-3">💰 อัตราเงินสะสมและเงินสมทบ</h5><p><em>(ต้องนำส่งภายในวันที่ 15 ของทุกเดือน)</em></p><ul><li>1 ต.ค. 68 - 30 ก.ย. 73: <strong>0.25%</strong> ของค่าจ้าง</li><li>1 ต.ค. 73 เป็นต้นไป: <strong>0.50%</strong> ของค่าจ้าง</li></ul><p><strong>📌 ค่าจ้างที่นำมาคำนวณ:</strong> เฉพาะเงินที่จ่ายตอบแทนการทำงานในเวลาปกติ และวันหยุด/วันลาตามสิทธิ (จ่ายประจำ จำนวนแน่นอน)<br><em>*ไม่รวม: โอที, เบี้ยขยัน, โบนัส, สวัสดิการต่างๆ</em></p><hr><h5 class="mt-3">📝 หน้าที่ของนายจ้างและข้อควรระวัง</h5><p>ต้องหักค่าจ้าง จ่ายเงินสมทบ และนำส่งเข้ากองทุนภายในวันที่ 15 ของเดือนถัดไป รวมถึงยื่นแบบแสดงรายชื่อลูกจ้าง (สกล. 3) <strong>หากส่งเงินล่าช้า จะต้องเสียเงินเพิ่ม 5% ต่อเดือน</strong> และหากไม่ปฏิบัติตามข้อกำหนดจะมีโทษทางกฎหมาย (จำคุกสูงสุด 6 เดือน หรือปรับไม่เกิน 1 หมื่นบาท)</p>',
                category: 'HR',
                date: '20 ก.ค. 2026',
                pdfLink: 'https://mixky004456.github.io/my-hr-liff/downloaded_pdf.pdf',
                image: 'https://mixky004456.github.io/my-hr-liff/%E0%B8%AA%E0%B8%B4%E0%B8%97%E0%B8%98%E0%B8%B4%E0%B8%9B%E0%B8%A3%E0%B8%B0%E0%B9%82%E0%B8%A2%E0%B8%8A%E0%B8%99%E0%B9%8C%E0%B8%81%E0%B8%AD%E0%B8%87%E0%B8%97%E0%B8%B8%E0%B8%99%E0%B8%AA%E0%B8%87%E0%B9%80%E0%B8%84%E0%B8%A3%E0%B8%B2%E0%B8%B0%E0%B8%AB%E0%B9%8C%E0%B8%A5%E0%B8%B9%E0%B8%81%E0%B8%88%E0%B9%89%E0%B8%B2%E0%B8%87_2569.png'
            }
        ];

        let articles = defaultArticles;
        let categories = ['All', 'HR', 'IT', 'QMS', 'วิชาการ'];
        let currentCategory = 'All';
        let searchQuery = '';

        // Initialize Page
        document.addEventListener('DOMContentLoaded', () => {
            fetchArticles();

            // Search Input Event
            document.getElementById('searchInput').addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase();
                renderArticles();
            });
        });

        // Fetch Articles from Google Sheets API
        async function fetchArticles() {
            const grid = document.getElementById('knowledgeGrid');
            if (grid) {
                grid.innerHTML = `
                    <div class="col-12 text-center py-5">
                        <div class="spinner-border text-success" role="status"></div>
                        <p class="mt-3 text-muted" style="font-size: 0.9rem;">กำลังโหลดข้อมูลองค์ความรู้...</p>
                    </div>`;
            }

            try {
                if (typeof GAS_API_URL !== 'undefined' && GAS_API_URL) {
                    const res = await fetch(GAS_API_URL + "?action=getKnowledgeArticles");
                    const result = await res.json();
                    if (result.status === "success" && Array.isArray(result.data) && result.data.length > 0) {
                        articles = result.data;
                    }
                }
            } catch (err) {
                console.warn("ไม่สามารถดึงข้อมูลจาก API ได้ ใช้ข้อมูลตั้งต้นแทน:", err);
            } finally {
                // Extract categories dynamically
                const uniqueCats = [...new Set(articles.map(a => a.category).filter(Boolean))];
                if (uniqueCats.length > 0) {
                    categories = ['All', ...uniqueCats];
                }
                renderCategories();
                renderArticles();
            }
        }

        // Render Categories ในรูปแบบ Dropdown (<option>)
        function renderCategories() {
            const select = document.getElementById('categorySelect');
            select.innerHTML = categories.map(cat => `
                <option value="${cat}" ${cat === currentCategory ? 'selected' : ''}>
                    ${cat === 'All' ? 'ทั้งหมด (All Categories)' : 'หมวด ' + cat}
                </option>
            `).join('');
        }

        // Set Active Category
        function setCategory(cat) {
            currentCategory = cat;
            renderArticles();
        }

        // Get Icon Class based on category
        function getIconData(category) {
            switch (category) {
                case 'HR': return { class: 'icon-hr', icon: 'bi-people-fill' };
                case 'IT': return { class: 'icon-it', icon: 'bi-pc-display' };
                case 'QMS': return { class: 'icon-qms', icon: 'bi-clipboard-check-fill' };
                case 'วิชาการ': return { class: 'icon-academic', icon: 'bi-book-half' };
                default: return { class: 'icon-general', icon: 'bi-journal-text' };
            }
        }

        // Open Article Modal
        function openArticle(id) {
            const article = articles.find(a => a.id === id);
            if (article) {
                document.getElementById('articleTitle').innerText = article.title;

                const carouselInner = document.getElementById('carouselInner');
                const controls = document.getElementById('carouselControls');

                let slidesHtml = '';

                if (article.image) {
                    slidesHtml += `
                        <div class="carousel-item active">
                            <div class="position-relative" style="padding: 30px 20px; text-align: center; background: #f8fafc; overflow: hidden; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--line);">
                                <img src="${article.image}" alt="Article Image" class="img-fluid" style="border-radius: 14px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); max-height: 60vh; width: auto; max-width: 100%;">
                            </div>
                            <div class="text-center mt-3 mb-3 text-muted" style="font-size: 0.85rem; font-weight: 500;">
                                <i class="bi bi-hand-index-thumb"></i> ปัดซ้ายหรือกดลูกศรเพื่ออ่านเนื้อหา <i class="bi bi-arrow-right"></i>
                            </div>
                        </div>
                        <div class="carousel-item">
                            <div style="padding: 24px;">
                                <div class="mb-3">
                                    <span class="k-category">${article.category}</span>
                                    <span class="text-muted ms-2" style="font-size: 0.85rem;"><i class="bi bi-clock"></i> ${article.date}</span>
                                </div>
                                <div style="color: var(--ink); line-height: 1.8;">
                                    ${article.content}
                                </div>
                            </div>
                        </div>
                    `;
                    controls.innerHTML = `
                        <button class="carousel-control-prev" type="button" data-bs-target="#articleCarousel" data-bs-slide="prev" style="width: 40px; background: rgba(0,0,0,0.25); margin: auto 0; height: 40px; top: 35%; transform: translateY(-50%); border-radius: 0 50% 50% 0;">
                            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                            <span class="visually-hidden">Previous</span>
                        </button>
                        <button class="carousel-control-next" type="button" data-bs-target="#articleCarousel" data-bs-slide="next" style="width: 40px; background: rgba(0,0,0,0.25); margin: auto 0; height: 40px; top: 35%; transform: translateY(-50%); border-radius: 50% 0 0 50%;">
                            <span class="carousel-control-next-icon" aria-hidden="true"></span>
                            <span class="visually-hidden">Next</span>
                        </button>
                    `;
                } else {
                    slidesHtml += `
                        <div class="carousel-item active">
                            <div style="padding: 24px;">
                                <div class="mb-3">
                                    <span class="k-category">${article.category}</span>
                                    <span class="text-muted ms-2" style="font-size: 0.85rem;"><i class="bi bi-clock"></i> ${article.date}</span>
                                </div>
                                <div style="color: var(--ink); line-height: 1.8;">
                                    ${article.content}
                                </div>
                            </div>
                        </div>
                    `;
                    controls.innerHTML = '';
                }

                carouselInner.innerHTML = slidesHtml;

                const pdfBtn = document.getElementById('pdfDownloadBtn');
                if (article.pdfLink) {
                    pdfBtn.href = article.pdfLink;
                    pdfBtn.classList.remove('d-none');
                } else {
                    pdfBtn.classList.add('d-none');
                }

                const modal = new bootstrap.Modal(document.getElementById('articleModal'));
                modal.show();
            }
        }

        // Render Knowledge Cards
        function renderArticles() {
            const grid = document.getElementById('knowledgeGrid');
            const noResults = document.getElementById('noResults');

            // Filter Data
            const filteredArticles = articles.filter(doc => {
                const matchCategory = currentCategory === 'All' || doc.category === currentCategory;
                const matchSearch = doc.title.toLowerCase().includes(searchQuery) ||
                    doc.description.toLowerCase().includes(searchQuery);
                return matchCategory && matchSearch;
            });

            if (filteredArticles.length === 0) {
                grid.innerHTML = '';
                noResults.classList.remove('d-none');
                return;
            }

            noResults.classList.add('d-none');

            grid.innerHTML = filteredArticles.map(doc => {
                const iconData = getIconData(doc.category);
                return `
                    <div class="col-12 col-md-6">
                        <div class="knowledge-card">
                            <div class="k-icon-wrapper ${iconData.class}">
                                <i class="bi ${iconData.icon}"></i>
                            </div>
                            <h3 class="k-title">${doc.title}</h3>
                            <p class="k-desc">${doc.description}</p>
                            <div class="k-meta">
                                <span class="k-category">${doc.category}</span>
                                <button class="btn-read" onclick="openArticle(${doc.id})">
                                    <i class="bi bi-book"></i> อ่าน
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>

</html>
