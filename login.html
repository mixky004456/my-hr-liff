<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กำลังตรวจสอบข้อมูล...</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Prompt', sans-serif; text-align: center; padding: 50px 20px; background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%); min-height: 100vh; }
        #loading { color: #16a34a; font-weight: bold; font-size: 20px; margin-top: 20px; }
    </style>
</head>
<body>
    <h2 id="loading">กำลังโหลดข้อมูล กรุณารอสักครู่...</h2>

    <script>
        const MY_LIFF_ID = "2010429320-3JYooRcB"; 

        async function main() {
            await liff.init({ liffId: MY_LIFF_ID });
            
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                const uid = profile.userId;
                
                // ดึงค่า target จาก URL (เช่น ?target=leave หรือ ?target=booking)
                const urlParams = new URLSearchParams(window.location.search);
                const target = urlParams.get('target') || 'leave'; // ถ้าไม่ระบุ ให้ไปหน้า leave
                
                // ส่งต่อไปยังไฟล์ HTML ภายในโปรเจกต์เดียวกันบน GitHub Pages
                window.location.href = target + ".html?uid=" + uid;
            } else {
                liff.login();
            }
        }
        main();
    </script>
</body>
</html>
