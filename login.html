<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กำลังตรวจสอบข้อมูล...</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px 20px; background-color: #f4f4f4; }
        #loading { color: #00B900; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>
    <h2 id="loading">กำลังเตรียมหน้าลงทะเบียน กรุณารอสักครู่...</h2>

    <script>
        const MY_LIFF_ID = "2010429320-3JYooRcB"; 
        // URL ของ Google Apps Script ของคุณ
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxIxols6kVZxwkFjR_3YXC-K6PY6hunRXgoRKnkpcQXS6ZGuqQWLjkgNMdnBvAGQ_jLHQ/exec";

        async function main() {
            await liff.init({ liffId: MY_LIFF_ID });
            
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                const uid = profile.userId;
                
                // นำ UID ที่ได้ ส่งเป็นพารามิเตอร์ไปเปิดหน้าลงทะเบียน (register) ของระบบหลัก
                window.location.href = GAS_URL + "?page=register&uid=" + uid;
            } else {
                liff.login();
            }
        }
        main();
    </script>
</body>
</html>
