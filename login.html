<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กำลังตรวจสอบข้อมูล...</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px 20px; background-color: #f4f4f4; }
        #loading { color: #00B900; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>
    <h2 id="loading">กำลังเตรียมหน้าใช้งาน กรุณารอสักครู่...</h2>

    <script>
        const MY_LIFF_ID = "2010429320-3JYooRcB"; 
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxlxoIs6kVZxwkFjR_3YXC-K6PY6hunRXgoRKnpkcQXS6ZGuqQWLjkgNMdnBvAGQ_jLHQ/exec";

        async function main() {
            await liff.init({ liffId: MY_LIFF_ID });
            
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                const uid = profile.userId;
                
                // ดึงค่า target จาก URL (เช่น ?target=leave หรือ ?target=booking)
                const urlParams = new URLSearchParams(window.location.search);
                const target = urlParams.get('target') || 'leave'; // ถ้าไม่ระบุ ให้ไปหน้า leave
                
                // ส่งต่อไปยัง Google Apps Script โดยใช้ค่า target ที่ดึงมาได้
                window.location.href = GAS_URL + "?page=" + target + "&uid=" + uid;
            } else {
                liff.login();
            }
        }
        main();
    </script>
</body>
</html>
