<!DOCTYPE html>
<html>

<head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ระบบฝึกอบรม (Training)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="config.js"></script>

    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            min-height: 100vh;
            padding: 20px 10px;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
        }

        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            background: #ffffff;
            overflow: hidden;
        }

        .card-header-custom {
            background: #ffffff;
            color: #16a34a;
            padding: 30px 20px 20px;
            text-align: center;
        }

        .card-header-custom h3 {
            font-weight: 600;
            margin: 0;
        }

        .card-body {
            padding: 20px;
        }

        /* ตกแต่งแถบเมนู (Tabs) */
        .nav-pills {
            background-color: #f1f5f9;
            border-radius: 12px;
            padding: 5px;
            margin-bottom: 20px;
        }

        .nav-pills .nav-link {
            color: #64748b;
            font-weight: 500;
            border-radius: 10px;
            padding: 10px 5px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .nav-pills .nav-link.active {
            background-color: #16a34a;
            color: #ffffff;
            box-shadow: 0 4px 10px rgba(22, 163, 74, 0.3);
        }

        /* ตกแต่งการ์ดรายการอบรม */
        .course-card {
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .course-card:hover {
            border-color: #16a34a;
            background-color: #f0fdf4;
        }

        .course-card-img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            display: block;
        }

        .course-card-body {
            padding: 15px;
        }

        .course-title {
            font-weight: 600;
            color: #1e293b;
            font-size: 1.05rem;
            margin-bottom: 8px;
        }

        .course-detail {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 10px;
            line-height: 1.7;
        }

        .course-detail i {
            color: #16a34a;
            width: 18px;
            text-align: center;
            margin-right: 4px;
        }

        .instructor-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .instructor-badge.internal {
            background-color: #dcfce7;
            color: #16a34a;
        }

        .instructor-badge.external {
            background-color: #fef3c7;
            color: #d97706;
        }

        .instructor-badge.ojt {
            background-color: #ede9fe;
            color: #7c3aed;
        }

        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .status-badge.open {
            background-color: #dcfce7;
            color: #16a34a;
        }

        .status-badge.closed {
            background-color: #fee2e2;
            color: #dc2626;
        }

        .status-badge.upcoming {
            background-color: #e0f2fe;
            color: #0284c7;
        }

        .btn-register {
            background-color: #e2e8f0;
            color: #475569;
            border: none;
            border-radius: 8px;
            padding: 8px 15px;
            font-size: 0.85rem;
            font-weight: 500;
            width: 100%;
        }

        .btn-register.available {
            background-color: #16a34a;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #94a3b8;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        /* Loading spinner for courses */
        .courses-loading {
            text-align: center;
            padding: 30px;
            color: #94a3b8;
        }

        /* ประวัติการอบรม - สรุปชั่วโมง */
        .summary-box {
            background: linear-gradient(135deg, #f0fdf4, #dcfce7);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: center;
        }

        .summary-box .hours {
            font-size: 2rem;
            font-weight: 700;
            color: #16a34a;
        }

        .summary-box .label {
            font-size: 0.8rem;
            color: #64748b;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="card-header-custom">
                <h3><i class="bi bi-journal-bookmark-fill text-success"></i> ระบบฝึกอบรม</h3>
            </div>
            <div class="card-body">

                <!-- Loading State (หมุนรอตรวจสอบสิทธิ์) -->
                <div id="loadingSection" class="text-center py-5">
                    <div class="spinner-border text-success" role="status"></div>
                    <p class="mt-3 text-muted">กำลังตรวจสอบสิทธิ์เข้าใช้งาน...</p>
                </div>

                <!-- พื้นที่แสดงข้อผิดพลาด (ซ่อนไว้ก่อน) -->
                <div id="errorSection" style="display: none;" class="text-center text-danger py-4"></div>

                <!-- เนื้อหาหลัก (ซ่อนไว้ก่อนจนกว่าจะตรวจสอบสิทธิ์ผ่าน) -->
                <div id="mainContent" style="display: none;">

                    <div class="alert alert-success" style="border-radius: 12px; font-size: 0.9rem;">
                        <i class="bi bi-person-circle"></i> ยินดีต้อนรับคุณ <b id="welcomeName">-</b>
                    </div>

                    <!-- แถบเมนู 3 อัน -->
                    <ul class="nav nav-pills nav-justified" id="trainingTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="internal-tab" data-bs-toggle="pill"
                                data-bs-target="#internal" type="button" role="tab">
                                <i class="bi bi-building"></i> อบรมประจำปี
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="announce-tab" data-bs-toggle="pill" data-bs-target="#announce"
                                type="button" role="tab">
                                <i class="bi bi-megaphone"></i> หลักสูตรที่น่าสนใจ
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="history-tab" data-bs-toggle="pill" data-bs-target="#history"
                                type="button" role="tab">
                                <i class="bi bi-clock-history"></i> ประวัติการอบรมของฉัน
                            </button>
                        </li>
                    </ul>

                    <!-- เนื้อหาของแต่ละเมนู -->
                    <div class="tab-content" id="trainingTabsContent">

                        <!-- 1. หน้า อบรมของบริษัท (ภายใน) -->
                        <div class="tab-pane fade show active" id="internal" role="tabpanel">
                            <h6 class="text-success mb-3" style="font-weight: 600;">หลักสูตรภายในบริษัท</h6>
                            <div id="internalCoursesList">
                                <div class="courses-loading">
                                    <div class="spinner-border spinner-border-sm text-success" role="status"></div>
                                    <p class="mt-2 mb-0" style="font-size: 0.85rem;">กำลังโหลดหลักสูตร...</p>
                                </div>
                            </div>
                        </div>

                        <!-- 2. หน้า ประกาศอบรมภายนอก -->
                        <div class="tab-pane fade" id="announce" role="tabpanel">
                            <h6 class="text-success mb-3" style="font-weight: 600;">ประกาศอบรมภายนอก / ข่าวสาร</h6>
                            <div id="externalCoursesList">
                                <div class="courses-loading">
                                    <div class="spinner-border spinner-border-sm text-success" role="status"></div>
                                    <p class="mt-2 mb-0" style="font-size: 0.85rem;">กำลังโหลดหลักสูตร...</p>
                                </div>
                            </div>
                        </div>

                        <!-- 3. หน้า ประวัติการอบรม (ดึงจาก API) -->
                        <div class="tab-pane fade" id="history" role="tabpanel">
                            <h6 class="text-success mb-3" style="font-weight: 600;">ประวัติการผ่านการอบรมของคุณ</h6>
                            <div id="historyList">
                                <div class="courses-loading">
                                    <div class="spinner-border spinner-border-sm text-success" role="status"></div>
                                    <p class="mt-2 mb-0" style="font-size: 0.85rem;">กำลังโหลดประวัติ...</p>
                                </div>
                            </div>
                        </div>

                    </div> <!-- End Tab Content -->
                </div> <!-- End Main Content -->

            </div>
        </div>
    </div>

    <script>
        let currentUser = null;

        // ฟังก์ชันสร้างการ์ดหลักสูตร (สำหรับแท็บ อบรมประจำปี และ หลักสูตรที่สนใจ)
        function buildCourseCard(course) {
            let card = document.createElement('div');
            card.className = 'course-card';

            let html = '';

            // รูปภาพ (ถ้ามี)
            if (course.imageUrl) {
                html += `<img src="${course.imageUrl}" alt="${course.courseName}" class="course-card-img" onerror="this.style.display='none'">`;
            }

            // ป้ายสถานะ
            let statusClass = 'open';
            let statusIcon = 'bi-check-circle';
            if (course.status === 'ปิดรับสมัคร') {
                statusClass = 'closed';
                statusIcon = 'bi-x-circle';
            } else if (course.status === 'เร็วๆ นี้') {
                statusClass = 'upcoming';
                statusIcon = 'bi-clock';
            }

            // ป้ายวิทยากร
            let instructorTypeClass = course.type === 'ภายนอก' ? 'external' : (course.type === 'OJT' || course.type === 'O.J.T.' ? 'ojt' : 'internal');
            let instructorTypeLabel = course.type === 'ภายนอก' ? 'วิทยากรภายนอก' : (course.type === 'OJT' || course.type === 'O.J.T.' ? 'OJT (หน้างาน)' : 'วิทยากรภายใน');

            html += `<div class="course-card-body">`;
            html += `<div class="d-flex justify-content-between align-items-start mb-1">`;
            html += `<div class="course-title" style="flex:1;">${course.courseName}</div>`;
            html += `</div>`;

            html += `<div class="mb-2">`;
            html += `<span class="instructor-badge ${instructorTypeClass}"><i class="bi bi-person-badge"></i> ${instructorTypeLabel}</span> `;
            html += `<span class="status-badge ${statusClass}"><i class="bi ${statusIcon}"></i> ${course.status}</span>`;
            html += `</div>`;

            html += `<div class="course-detail">`;
            html += `<i class="bi bi-calendar-event"></i> วันที่: ${course.date}<br>`;
            if (course.duration) {
                html += `<i class="bi bi-hourglass-split"></i> เวลาที่ใช้อบรม: ${course.duration}<br>`;
            }
            html += `<i class="bi bi-geo-alt"></i> สถานที่: ${course.location}<br>`;
            html += `</div>`;

            // ปุ่ม
            if (course.status === 'เปิดรับสมัคร') {
                if (course.docUrl) {
                    html += `<a href="${course.docUrl}" target="_blank" class="btn btn-register available text-decoration-none text-center d-block"><i class="bi bi-file-earmark-arrow-down"></i> ดาวน์โหลดเอกสารสมัคร</a>`;
                } else {
                    html += `<button class="btn btn-register" disabled><i class="bi bi-info-circle"></i> ติดต่อรับเอกสารสมัครที่ HR</button>`;
                }
            } else if (course.status === 'ปิดรับสมัคร') {
                html += `<button class="btn btn-register" disabled><i class="bi bi-x-circle"></i> ปิดรับสมัครแล้ว</button>`;
            } else {
                html += `<button class="btn btn-register" style="background-color: #e0f2fe; color: #0284c7;"><i class="bi bi-clock"></i> ${course.status}</button>`;
            }

            html += `</div>`;

            card.innerHTML = html;
            return card;
        }

        // ฟังก์ชันโหลดหลักสูตรจาก API
        function loadTrainingCourses() {
            fetch(GAS_API_URL + "?action=getTrainingCourses")
                .then(res => res.json())
                .then(response => {
                    if (response.status === 'success' && response.data) {
                        let courses = response.data;

                        let internalList = document.getElementById('internalCoursesList');
                        let externalList = document.getElementById('externalCoursesList');

                        internalList.innerHTML = '';
                        externalList.innerHTML = '';

                        let internalCount = 0;
                        let externalCount = 0;

                        courses.forEach(course => {
                            let card = buildCourseCard(course);

                            // ตรวจสอบว่าจะให้แสดงที่แท็บไหน
                            let showInInterestTab = false;

                            if (course.displayTab === 'หลักสูตรที่สนใจ' || course.displayTab === 'หลักสูตรที่น่าสนใจ' || course.displayTab === 'ภายนอก') {
                                showInInterestTab = true;
                            } else if (course.displayTab === 'อบรมประจำปี' || course.displayTab === 'ภายใน') {
                                showInInterestTab = false;
                            } else {
                                // ถ้าไม่ได้ระบุ ให้ค่าเริ่มต้นเป็น "อบรมประจำปี" (จัดการโดยบริษัท) เสมอ
                                // ไม่ว่าวิทยากรจะเป็นบุคคลภายนอกหรือไม่ก็ตาม
                                showInInterestTab = false;
                            }

                            if (showInInterestTab) {
                                externalList.appendChild(card);
                                externalCount++;
                            } else {
                                internalList.appendChild(card);
                                internalCount++;
                            }
                        });

                        // แสดงข้อความว่างถ้าไม่มีคอร์ส
                        if (internalCount === 0) {
                            internalList.innerHTML = '<div class="empty-state"><i class="bi bi-inbox"></i><p>ยังไม่มีหลักสูตรภายในในขณะนี้</p></div>';
                        }
                        if (externalCount === 0) {
                            externalList.innerHTML = '<div class="empty-state"><i class="bi bi-inbox"></i><p>ยังไม่มีหลักสูตรภายนอกในขณะนี้</p></div>';
                        }
                    } else {
                        document.getElementById('internalCoursesList').innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>ไม่สามารถโหลดข้อมูลหลักสูตรได้</p></div>';
                        document.getElementById('externalCoursesList').innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>ไม่สามารถโหลดข้อมูลหลักสูตรได้</p></div>';
                    }
                })
                .catch(error => {
                    console.error('Error loading courses:', error);
                    document.getElementById('internalCoursesList').innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>เกิดข้อผิดพลาดในการโหลดข้อมูล</p></div>';
                    document.getElementById('externalCoursesList').innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>เกิดข้อผิดพลาดในการโหลดข้อมูล</p></div>';
                });
        }

        // ฟังก์ชันโหลดประวัติการอบรมจาก API
        function loadTrainingHistory() {
            if (!currentUser) return;

            let historyList = document.getElementById('historyList');
            historyList.innerHTML = '<div class="courses-loading"><div class="spinner-border spinner-border-sm text-success" role="status"></div><p class="mt-2 mb-0" style="font-size: 0.85rem;">กำลังโหลดประวัติ...</p></div>';

            fetch(GAS_API_URL + "?action=getMyTrainingHistory&empId=" + encodeURIComponent(currentUser.empId))
                .then(res => res.json())
                .then(response => {
                    if (response.status === 'success' && response.data) {
                        let records = response.data;
                        historyList.innerHTML = '';

                        if (records.length === 0) {
                            historyList.innerHTML = '<div class="empty-state"><i class="bi bi-inbox"></i><p>ยังไม่มีประวัติการอบรม</p></div>';
                            return;
                        }

                        // กล่องสรุปชั่วโมงอบรมถูกนำออกแล้ว

                        // แสดงรายการประวัติ
                        records.forEach(record => {
                            let statusBadge = '';
                            let bgColor = '#f8fafc';

                            if (record.status === 'ผ่านการอบรม' || record.status === 'ผ่าน') {
                                statusBadge = '<span class="badge bg-success">ผ่านการอบรม</span>';
                            } else if (record.status === 'รอเข้าอบรม') {
                                statusBadge = '<span class="badge bg-warning text-dark">รอเข้าอบรม</span>';
                                bgColor = '#fffbeb';
                            } else if (record.status === 'ขาดอบรม') {
                                statusBadge = '<span class="badge bg-danger">ขาดอบรม</span>';
                                bgColor = '#fef2f2';
                            } else {
                                statusBadge = `<span class="badge bg-secondary">${record.status}</span>`;
                            }

                            let typeBadge = '';
                            if (record.type === 'ภายนอก') {
                                typeBadge = '<span class="badge bg-warning text-dark ms-1">อบรมภายนอก</span>';
                            } else if (record.type === 'OJT' || record.type === 'O.J.T.') {
                                typeBadge = '<span class="badge ms-1" style="background-color: #8b5cf6; color: white;">OJT</span>';
                            } else {
                                typeBadge = '<span class="badge bg-info text-dark ms-1">อบรมภายใน</span>';
                            }

                            let cardHtml = `<div class="course-card" style="background-color: ${bgColor};">
                                <div class="course-card-body">
                                    <div class="d-flex justify-content-between align-items-center mb-2">
                                        <div>
                                            ${statusBadge}
                                            ${typeBadge}
                                        </div>
                                        <small class="text-muted">${record.date}</small>
                                    </div>
                                    <div class="course-title" style="font-size: 0.95rem;">${record.courseName}</div>
                                    ${record.duration ? `<div style="font-size:0.8rem; color:#64748b;"><i class="bi bi-hourglass-split"></i> ${record.duration} ชั่วโมง</div>` : ''}
                                </div>
                            </div>`;

                            historyList.innerHTML += cardHtml;
                        });

                    } else {
                        historyList.innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>ไม่สามารถโหลดประวัติได้</p></div>';
                    }
                })
                .catch(error => {
                    console.error('Error loading history:', error);
                    historyList.innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>เกิดข้อผิดพลาดในการโหลดประวัติ</p></div>';
                });
        }

        window.onload = function () {
            const urlParams = new URLSearchParams(window.location.search);
            const UID_FROM_LINE = urlParams.get('uid');

            // 1. เช็คว่ามี UID ส่งมาไหม (กันคนเปิดลิงก์ตรงๆ นอก LINE)
            if (!UID_FROM_LINE) {
                document.getElementById('loadingSection').style.display = 'none';
                document.getElementById('errorSection').innerHTML = '<h4><i class="bi bi-x-circle-fill"></i> ข้อผิดพลาด</h4><p>ไม่พบรหัสผู้ใช้งาน กรุณาเข้าใช้งานผ่านปุ่มใน LINE เท่านั้น</p>';
                document.getElementById('errorSection').style.display = 'block';
                return;
            }

            // 2. ส่ง UID ไปถาม Google Sheets ผ่าน API ว่าพนักงานคนนี้ลงทะเบียนหรือยัง
            fetch(GAS_API_URL + "?action=getEmployeeData&uid=" + UID_FROM_LINE)
                .then(res => res.json())
                .then(response => {
                    document.getElementById('loadingSection').style.display = 'none';

                    if (response.status !== 'success' || !response.data) {
                        document.getElementById('errorSection').innerHTML = '<div style="padding:30px 10px;text-align:center;"><div style="width:70px;height:70px;background:#fef2f2;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 15px;font-size:2rem;color:#ef4444;"><i class="bi bi-person-x-fill"></i></div><h5 style="color:#ef4444;font-weight:600;">ไม่พบข้อมูลพนักงาน</h5><p style="color:#64748b;font-size:0.88rem;line-height:1.8;">ระบบไม่พบข้อมูลของคุณในฐานข้อมูล<br>กรุณาติดต่อ <b style="color:#334155;">ฝ่ายบุคคล (HR)</b><br>เพื่อดำเนินการลงทะเบียนเข้าใช้งาน</p></div>';
                        document.getElementById('errorSection').style.display = 'block';
                        return;
                    }

                    const emp = response.data;
                    // ตรวจสอบผ่าน เปิดให้เห็นหน้าข้อมูล
                    currentUser = emp;
                    document.getElementById('welcomeName').innerText = emp.name;
                    document.getElementById('mainContent').style.display = 'block';

                    // โหลดหลักสูตรอบรมจาก Google Sheet
                    loadTrainingCourses();

                    // โหลดประวัติการอบรมจาก Google Sheet
                    loadTrainingHistory();
                })
                .catch(error => {
                    document.getElementById('loadingSection').style.display = 'none';
                    document.getElementById('errorSection').innerHTML = '<h4>ข้อผิดพลาดระบบ</h4><p>' + error.message + '</p>';
                    document.getElementById('errorSection').style.display = 'block';
                });
        };
    </script>
</body>

</html>
