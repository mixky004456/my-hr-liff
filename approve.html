<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>อนุมัติใบลา</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="config.js"></script>
    <style>
        :root {
            --brand: #16a34a;
            --danger: #dc2626;
            --ink: #1e293b;
            --muted: #64748b;
            --line: #e2e8f0;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 24px 14px 60px;
        }

        .container { max-width: 560px; width: 100%; }

        .card {
            border: none;
            border-radius: 22px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.09);
            background: #fff;
            overflow: hidden;
        }

        .card-head {
            padding: 26px 24px;
            color: #fff;
            background: var(--brand);
        }

        .card-head.reject { background: var(--danger); }
        .card-head.done { background: #64748b; }

        .card-head h1 {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0 0 4px;
        }

        .card-head .sub { font-size: 0.85rem; opacity: 0.9; }

        .card-body { padding: 24px; }

        .info-row {
            display: flex;
            gap: 14px;
            padding: 11px 0;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.92rem;
        }

        .info-row:last-child { border-bottom: none; }
        .info-row .k { color: var(--muted); flex: 0 0 96px; }
        .info-row .v { color: var(--ink); font-weight: 500; flex: 1; word-break: break-word; }
        .info-row .v.hl { color: var(--brand); }

        .section-title {
            font-size: 0.78rem;
            color: var(--muted);
            text-transform: none;
            letter-spacing: 0.3px;
            margin: 22px 0 8px;
            font-weight: 500;
        }

        .quota-chip {
            display: inline-block;
            background: #f1f5f9;
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.83rem;
            color: #475569;
        }

        .trail {
            background: #f8fafc;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 0.86rem;
            color: #475569;
            line-height: 1.8;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 15px;
            border: 1.5px solid var(--line);
            background: #f8fafc;
            font-size: 0.94rem;
        }

        .form-control:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.1);
            background: #fff;
        }

        .btn-act {
            border: none;
            border-radius: 13px;
            padding: 15px;
            font-weight: 600;
            font-size: 1rem;
            color: #fff;
            width: 100%;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .btn-act:disabled { opacity: 0.6; }
        .btn-approve { background: var(--brand); box-shadow: 0 4px 14px rgba(22, 163, 74, 0.3); }
        .btn-reject { background: var(--danger); box-shadow: 0 4px 14px rgba(220, 38, 38, 0.3); }
        .btn-act:hover:not(:disabled) { transform: translateY(-2px); }
        .btn-act:focus-visible { outline: 3px solid #0f172a; outline-offset: 2px; }

        .btn-switch {
            background: transparent;
            border: none;
            color: var(--muted);
            font-size: 0.87rem;
            text-decoration: underline;
            cursor: pointer;
            padding: 10px;
            width: 100%;
        }

        .state-box { text-align: center; padding: 48px 22px; }
        .state-box i { font-size: 3rem; display: block; margin-bottom: 14px; }
        .state-box h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; }
        .state-box p { color: var(--muted); font-size: 0.9rem; line-height: 1.8; margin: 0; }

        .badge-file {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: #ecfeff;
            border: 1px solid #a5f3fc;
            color: #0e7490;
            border-radius: 10px;
            padding: 10px 15px;
            font-size: 0.86rem;
            text-decoration: none;
        }

        @media (prefers-reduced-motion: reduce) {
            * { transition: none !important; }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div id="root">
                <div class="state-box">
                    <div class="spinner-border" style="color: var(--brand);" role="status">
                        <span class="visually-hidden">กำลังโหลด</span>
                    </div>
                    <p class="mt-3">กำลังโหลดข้อมูลใบลา</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let LEAVE = null;
        let CTX = null;
        let PARAMS = {};

        function esc(str) {
            return String(str || '').replace(/[&<>"']/g, function (c) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
            });
        }

        async function apiGet(params) {
            const res = await fetch(GAS_API_URL + '?' + new URLSearchParams(params).toString());
            if (!res.ok) throw new Error('เชื่อมต่อเซิร์ฟเวอร์ไม่สำเร็จ (' + res.status + ')');
            return res.json();
        }

        async function apiPost(action, data) {
            const res = await fetch(GAS_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: action, data: data })
            });
            if (!res.ok) throw new Error('เชื่อมต่อเซิร์ฟเวอร์ไม่สำเร็จ (' + res.status + ')');
            return res.json();
        }

        function renderState(icon, color, title, detail) {
            document.getElementById('root').innerHTML =
                '<div class="state-box">' +
                '<i class="bi ' + icon + '" style="color:' + color + ';"></i>' +
                '<h2 style="color:' + color + ';">' + title + '</h2>' +
                '<p>' + detail + '</p></div>';
        }

        window.addEventListener('DOMContentLoaded', function () {
            if (typeof GAS_API_URL === 'undefined' || !GAS_API_URL) {
                renderState('bi-gear-fill', '#dc2626', 'ยังไม่ได้ตั้งค่าระบบ', 'ไม่พบ GAS_API_URL ในไฟล์ config.js');
                return;
            }

            const p = new URLSearchParams(window.location.search);
            PARAMS = {
                id: p.get('id') || '',
                token: p.get('t') || '',
                uid: (p.get('uid') || '').trim(),
                act: p.get('act') || ''
            };

            if (!PARAMS.id || !PARAMS.token || !PARAMS.uid) {
                renderState('bi-link-45deg', '#dc2626', 'ลิงก์ไม่สมบูรณ์',
                    'กรุณากดลิงก์จากข้อความแจ้งเตือนใน LINE อีกครั้ง');
                return;
            }

            loadLeave();
        });

        async function loadLeave() {
            try {
                const res = await apiGet({
                    action: 'getLeaveForApproval',
                    id: PARAMS.id,
                    token: PARAMS.token,
                    uid: PARAMS.uid
                });

                if (res.status !== 'success') {
                    renderState('bi-shield-exclamation', '#dc2626', 'เปิดใบลานี้ไม่ได้', esc(res.message));
                    return;
                }

                LEAVE = res.data;
                CTX = res;
                render();
            } catch (err) {
                renderState('bi-wifi-off', '#dc2626', 'เชื่อมต่อไม่สำเร็จ', esc(err.message));
            }
        }

        function render() {
            const dateText = LEAVE.startDate === LEAVE.endDate
                ? LEAVE.startDateThai
                : LEAVE.startDateThai + ' ถึง ' + LEAVE.endDateThai;

            // ---- ใบลาที่จบขั้นตอนแล้ว ----
            if (!CTX.canAct) {
                const isDone = LEAVE.status === 'อนุมัติ';
                const isCancelled = LEAVE.status === 'ยกเลิก';
                const color = isDone ? '#16a34a'
                    : (LEAVE.status === 'ไม่อนุมัติ' ? '#dc2626' : '#64748b');

                const headline = isCancelled
                    ? 'พนักงานยกเลิกใบลานี้แล้ว'
                    : 'ใบลานี้ไม่ต้องดำเนินการ';

                let extra = '';
                if (isCancelled) {
                    extra = '<div class="section-title">การยกเลิก</div><div class="trail">' +
                        '<div><i class="bi bi-slash-circle" style="color:#64748b;"></i> ยกเลิกเมื่อ ' +
                        esc(LEAVE.cancelAt || '-') + '</div>' +
                        (LEAVE.cancelReason
                            ? '<div style="color:#b45309;">เหตุผล: ' + esc(LEAVE.cancelReason) + '</div>'
                            : '') +
                        (LEAVE.supName
                            ? '<div style="color:#94a3b8;">การอนุมัติของ ' + esc(LEAVE.supName) +
                              ' เมื่อ ' + esc(LEAVE.supAt) + ' สิ้นผลแล้ว</div>'
                            : '') +
                        '<div style="color:#16a34a;">ระบบคืนสิทธิ์วันลาให้พนักงานเรียบร้อยแล้ว</div>' +
                        '</div>';
                }

                document.getElementById('root').innerHTML =
                    '<div class="card-head done"><h1>' + headline + '</h1>' +
                    '<div class="sub">' + esc(CTX.reason) + '</div></div>' +
                    '<div class="card-body">' + detailHtml(dateText) +
                    '<div class="section-title">สถานะปัจจุบัน</div>' +
                    '<div class="trail" style="color:' + color + ';font-weight:500;">' +
                    esc(LEAVE.status) + '</div>' + extra + trailHtml() + '</div>';
                return;
            }

            const roleLabel = CTX.currentRole === 'ฝ่ายบุคคล'
                ? 'ขั้นตอนที่ 2 — ฝ่ายบุคคล'
                : 'ขั้นตอนที่ 1 — หัวหน้า';

            // ถ้ามาจากปุ่ม "ไม่อนุมัติ" ให้เปิดโหมดปฏิเสธไว้เลย
            const startReject = PARAMS.act === 'reject';

            document.getElementById('root').innerHTML =
                '<div class="card-head" id="head">' +
                '<h1>พิจารณาใบลา</h1>' +
                '<div class="sub">' + roleLabel + ' &nbsp;·&nbsp; ผู้พิจารณา: ' +
                esc(CTX.approver.name) + '</div></div>' +

                '<div class="card-body">' +
                detailHtml(dateText) +
                trailHtml() +

                '<div class="section-title" id="noteTitle">' +
                (startReject ? 'เหตุผลที่ไม่อนุมัติ (จำเป็น)' : 'หมายเหตุ (ไม่บังคับ)') + '</div>' +
                '<textarea class="form-control" id="note" rows="3" placeholder="พิมพ์ข้อความถึงพนักงาน"></textarea>' +

                '<div style="margin-top:20px;" id="actions"></div>' +
                '</div>';

            renderActions(startReject);
        }

        function detailHtml(dateText) {
            let html =
                row('พนักงาน', LEAVE.empName) +
                row('รหัส', LEAVE.empId) +
                row('แผนก', LEAVE.department) +
                row('ตำแหน่ง', LEAVE.position) +
                '<div class="section-title">รายละเอียดการลา</div>' +
                row('ประเภท', LEAVE.leaveType, true) +
                row('วันที่', dateText) +
                row('จำนวน', LEAVE.durationText) +
                row('เหตุผล', LEAVE.reason) +
                row('ยื่นเมื่อ', LEAVE.timestamp);

            if (LEAVE.quotaText) {
                html += '<div class="section-title">สิทธิ์การลา</div>' +
                    '<span class="quota-chip"><i class="bi bi-pie-chart"></i> ' + esc(LEAVE.quotaText) + '</span>';
            }

            if (LEAVE.fileUrl) {
                html += '<div class="section-title">เอกสารแนบ</div>' +
                    '<a class="badge-file" href="' + esc(LEAVE.fileUrl) + '" target="_blank" rel="noopener">' +
                    '<i class="bi bi-paperclip"></i> เปิดดูเอกสารแนบ</a>';
            }
            return html;
        }

        function trailHtml() {
            if (!LEAVE.supName && !LEAVE.hrName) return '';
            let html = '<div class="section-title">ประวัติการพิจารณา</div><div class="trail">';
            if (LEAVE.supName) {
                html += '<div><i class="bi bi-check-circle-fill" style="color:#16a34a;"></i> หัวหน้า: ' +
                    esc(LEAVE.supName) + ' — ' + esc(LEAVE.supAt) +
                    (LEAVE.supNote ? '<br><span style="color:#94a3b8;">' + esc(LEAVE.supNote) + '</span>' : '') +
                    '</div>';
            }
            if (LEAVE.hrName) {
                html += '<div><i class="bi bi-check-circle-fill" style="color:#16a34a;"></i> ฝ่ายบุคคล: ' +
                    esc(LEAVE.hrName) + ' — ' + esc(LEAVE.hrAt) +
                    (LEAVE.hrNote ? '<br><span style="color:#94a3b8;">' + esc(LEAVE.hrNote) + '</span>' : '') +
                    '</div>';
            }
            return html + '</div>';
        }

        function row(k, v, highlight) {
            return '<div class="info-row"><span class="k">' + k + '</span>' +
                '<span class="v' + (highlight ? ' hl' : '') + '">' + esc(v || '-') + '</span></div>';
        }

        function renderActions(rejectMode) {
            const el = document.getElementById('actions');
            document.getElementById('head').className = 'card-head' + (rejectMode ? ' reject' : '');
            document.getElementById('noteTitle').textContent =
                rejectMode ? 'เหตุผลที่ไม่อนุมัติ (จำเป็น)' : 'หมายเหตุ (ไม่บังคับ)';

            if (rejectMode) {
                el.innerHTML =
                    '<button class="btn-act btn-reject" onclick="submitDecision(\'reject\')">' +
                    '<i class="bi bi-x-circle"></i> ยืนยันไม่อนุมัติ</button>' +
                    '<button class="btn-switch" onclick="renderActions(false)">' +
                    'เปลี่ยนใจ กลับไปหน้าอนุมัติ</button>';
            } else {
                el.innerHTML =
                    '<button class="btn-act btn-approve" onclick="submitDecision(\'approve\')">' +
                    '<i class="bi bi-check-circle"></i> อนุมัติใบลานี้</button>' +
                    '<button class="btn-switch" onclick="renderActions(true)">' +
                    'ไม่อนุมัติใบลานี้</button>';
            }
        }

        async function submitDecision(decision) {
            const note = document.getElementById('note').value.trim();

            if (decision === 'reject' && !note) {
                Swal.fire('ต้องระบุเหตุผล', 'กรุณาพิมพ์เหตุผลที่ไม่อนุมัติ เพื่อให้พนักงานเข้าใจ', 'warning');
                document.getElementById('note').focus();
                return;
            }

            const isFinal = CTX.currentRole === 'ฝ่ายบุคคล';
            const confirmText = decision === 'approve'
                ? (isFinal
                    ? 'อนุมัติแล้วใบลานี้จะมีผลทันที และระบบจะแจ้งพนักงาน'
                    : 'อนุมัติแล้วระบบจะส่งต่อให้ฝ่ายบุคคลพิจารณาขั้นถัดไป')
                : 'ระบบจะแจ้งพนักงานว่าใบลาไม่ได้รับอนุมัติ พร้อมเหตุผลที่คุณระบุ';

            const ok = await Swal.fire({
                title: decision === 'approve' ? 'ยืนยันการอนุมัติ' : 'ยืนยันการไม่อนุมัติ',
                text: confirmText,
                icon: decision === 'approve' ? 'question' : 'warning',
                showCancelButton: true,
                confirmButtonColor: decision === 'approve' ? '#16a34a' : '#dc2626',
                cancelButtonColor: '#94a3b8',
                confirmButtonText: 'ยืนยัน',
                cancelButtonText: 'กลับ'
            });
            if (!ok.isConfirmed) return;

            const buttons = document.querySelectorAll('#actions button');
            buttons.forEach(function (b) { b.disabled = true; });
            buttons[0].innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>กำลังบันทึก';

            try {
                const res = await apiPost('decideLeave', {
                    rowIndex: PARAMS.id,
                    token: PARAMS.token,
                    userId: PARAMS.uid,
                    decision: decision,
                    note: note
                });

                if (res.status !== 'success') throw new Error(res.message);

                const approved = decision === 'approve';
                renderState(
                    approved ? 'bi-check-circle-fill' : 'bi-x-circle-fill',
                    approved ? '#16a34a' : '#dc2626',
                    res.message,
                    'ระบบแจ้งผลให้ ' + esc(LEAVE.empName) + ' ทาง LINE เรียบร้อยแล้ว' +
                    (res.data && res.data.newStatus === 'รอฝ่ายบุคคลอนุมัติ'
                        ? '<br>และส่งการ์ดขออนุมัติให้ฝ่ายบุคคลแล้ว' : '') +
                    '<br><br><span style="font-size:0.84rem;">ปิดหน้านี้ได้เลย</span>'
                );

            } catch (err) {
                Swal.fire({
                    icon: 'error',
                    title: 'บันทึกไม่สำเร็จ',
                    text: err.message,
                    confirmButtonColor: '#ef4444'
                }).then(function () { loadLeave(); });
            }
        }
    </script>
</body>

</html>
